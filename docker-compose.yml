services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: water-monitoring-backend
    gpus: all
    ports:
      - "5002:5001"
    env_file:
      - .env
    environment:
      USE_GPU: "true"
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - ./instance:/app/instance
      - ./models:/app/models
    restart: unless-stopped

  frontend:
    build:
      context: ./React_UI/react_ui
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:5002/api
    container_name: water-monitoring-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
